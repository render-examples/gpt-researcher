services:
  - type: web
    name: gpt-researcher
    runtime: python
    plan: starter
    region: oregon
    # Install deps with UV: bootstrap uv via pip, then install into the runtime env (--system)
    buildCommand: pip install uv && uv pip install --system -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false   # set in Dashboard
      - key: TAVILY_API_KEY
        sync: false   # set in Dashboard
