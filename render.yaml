services:
  - type: web
    name: gpt-researcher
    runtime: python
    plan: starter
    region: oregon
    # Install deps with UV into the venv Render uses at runtime (.venv), not --system.
    # `which python` resolves to .venv/bin/python during build, so uv targets that env.
    buildCommand: pip install uv && uv pip install --python "$(which python)" -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false   # set in Dashboard
      - key: TAVILY_API_KEY
        sync: false   # set in Dashboard
