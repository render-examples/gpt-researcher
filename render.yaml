services:
  - type: web
    name: gpt-researcher
    runtime: python
    plan: starter
    region: oregon
    # Create ONE explicit venv and install into it. Render detects [tool.poetry] in pyproject.toml
    # and boots the app from .venv at runtime, but a bare `uv pip install` resolves its own target
    # and installs into the base interpreter instead -> runtime .venv has no deps. `uv venv` pins
    # the target: uv pip install then auto-targets the cwd .venv (/opt/render/project/src/.venv).
    buildCommand: pip install uv && uv venv && uv pip install -r requirements.txt
    # Boot from that same venv by explicit path -- no reliance on which interpreter Render activates.
    startCommand: .venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false   # set in Dashboard
      - key: TAVILY_API_KEY
        sync: false   # set in Dashboard
