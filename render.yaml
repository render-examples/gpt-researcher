services:
  - type: web
    name: gpt-researcher
    runtime: python
    plan: starter
    region: oregon
    # Install deps with UV into the venv Render runs from. No --python/--system needed:
    # uv targets the active venv ($VIRTUAL_ENV / .venv in cwd), both = /opt/render/project/src/.venv.
    buildCommand: pip install uv && uv pip install -r requirements.txt
    # Render activates .venv at runtime, so `python` is .venv/bin/python and uvicorn imports
    # directly. (uv run --no-project would use an isolated env that can't see .venv's deps.)
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false   # set in Dashboard
      - key: TAVILY_API_KEY
        sync: false   # set in Dashboard
