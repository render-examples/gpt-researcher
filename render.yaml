services:
  - type: web
    name: gpt-researcher
    runtime: python
    plan: starter
    region: oregon
    # Install deps with UV into the venv Render runs from. No --python/--system needed:
    # uv targets the active venv ($VIRTUAL_ENV / .venv in cwd), both = /opt/render/project/src/.venv.
    buildCommand: pip install uv && uv pip install -r requirements.txt
    # `uv run --no-project` runs uvicorn from that venv regardless of PATH; --no-project stops uv
    # from trying to sync the stale pyproject.toml.
    startCommand: uv run --no-project uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false   # set in Dashboard
      - key: TAVILY_API_KEY
        sync: false   # set in Dashboard
